name: chatkit_flutter
description: >-
  A white-label AI chat SDK for Flutter. Embed a fully functional AI chat
  widget powered by Claude AI and your own knowledge base — in 3 lines of code.
version: 1.0.0
homepage: https://github.com/khushiarora001/chatkit_flutter
repository: https://github.com/khushiarora001/chatkit_flutter
issue_tracker: https://github.com/khushiarora001/chatkit_flutter/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  library: true
